map $http_x_forwarded_proto $proxy_x_forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;
  port_in_redirect off;
  absolute_redirect off;
  client_max_body_size 30m;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Live streaming STT (WebSocket). Must be declared separately from /api/
  # because that block sets Connection "" for SSE, which breaks the WS upgrade.
  # Longest-prefix match makes this win for the streaming path only.
  location /api/v1/ai/speech/stt-stream {
    proxy_pass http://api:8000/api/v1/ai/speech/stt-stream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
  }

  location /auth/ {
    proxy_pass http://api:8000/auth/;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_read_timeout 300s;
  }

  location /mcp {
    proxy_pass http://api:8000/mcp;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
  }
}

