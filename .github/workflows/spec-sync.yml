name: Spec Sync Check

# Blocking drift gate for the spec-as-kb seed. Regenerates the seed SQL from the
# JSON source of truth and compares it to the committed copies, and checks zh/en
# node parity. Fails the PR if the committed SQL drifts from the seed JSON or an
# en node has no zh source. To refresh after editing seed JSON, run:
#   python scripts/seed_spec_kb.py --write
# (zh-without-en is reported as a warning and does not fail the job.)

on:
  pull_request:
    paths:
      - 'examples/spec-as-kb/**'
      - 'scripts/seed_spec_kb.py'
      - 'packages/api/migrations/003_seed_spec_kb.sql'
      - 'docs/schema-history/003_seed_spec_kb.sql'

jobs:
  spec-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install check dependencies
        run: pip install psycopg2-binary python-dotenv
      - name: Spec-sync drift check
        run: python scripts/seed_spec_kb.py --check
