name: API Integration Tests

on:
  push:
    paths:
      - 'packages/api/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'packages/api/**'

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      db-test:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: memtrace_test
          POSTGRES_USER: memtrace
          POSTGRES_PASSWORD: memtrace_test_pw
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U memtrace -d memtrace_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: packages/api/requirements.txt

      - name: Install dependencies
        working-directory: packages/api
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://memtrace:memtrace_test_pw@localhost:5433/memtrace_test
          SECRET_KEY: ci_test_secret_key
          ALLOW_WEAK_SECRET_KEY: "1"
          MEMTRACE_ANON_LOG_SALT: ci_salt
          REGISTRATION_MODE: open
          PYTHONPATH: .
        run: python -c "from core.database import run_migrations; run_migrations()"

      - name: Run P61 doc-links migration script
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://memtrace:memtrace_test_pw@localhost:5433/memtrace_test
          SECRET_KEY: ci_test_secret_key
          ALLOW_WEAK_SECRET_KEY: "1"
          MEMTRACE_ANON_LOG_SALT: ci_salt
          REGISTRATION_MODE: open
          PYTHONPATH: .
        run: python -m scripts.migrate_doc_links_to_edges

      - name: Run unit tests
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://memtrace:memtrace_test_pw@localhost:5433/memtrace_test
          SECRET_KEY: ci_test_secret_key
          MEMTRACE_ANON_LOG_SALT: ci_salt
          REGISTRATION_MODE: open
          PYTHONPATH: .
        run: |
          pytest tests/ -v --tb=short \
            -m "not integration" \
            --ignore=tests/test_ai_locking.py \
            --ignore=tests/test_multi_user_workflow.py

      - name: Run integration tests
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://memtrace:memtrace_test_pw@localhost:5433/memtrace_test
          TEST_DATABASE_URL: postgresql://memtrace:memtrace_test_pw@localhost:5433/memtrace_test
          SECRET_KEY: ci_test_secret_key
          MEMTRACE_ANON_LOG_SALT: ci_salt
          REGISTRATION_MODE: open
          PYTHONPATH: .
        run: |
          pytest tests/test_p61_extracted_from.py -v --tb=short -m "integration"
