version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: memtrace-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - memtrace_pgdata:/var/lib/postgresql/data
      - ./schema/sql:/docker-entrypoint-initdb.d:ro   # auto-run on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  memtrace_pgdata:
    driver: local
