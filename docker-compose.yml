
services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: memtrace-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      MEMTRACE_ANON_LOG_SALT: ${MEMTRACE_ANON_LOG_SALT:-dev_salt_123}
      REGISTRATION_MODE: ${MEMTRACE_REGISTRATION_MODE:-invite_only}
    ports:
      - "0.0.0.0:8001:8000"
    depends_on:
      - shared-postgres-check
    volumes:
      - ./packages/api/data:/app/data
      - ./packages/api/tests:/app/tests
      - ./backups:/backups
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-db
      - default

  shared-postgres-check:
    image: postgres:17-alpine
    container_name: memtrace-db-check
    restart: "no"
    entrypoint: >
      sh -c "until pg_isready -h shared-postgres -U ${POSTGRES_USER:-postgres}; do sleep 2; done"
    networks:
      - shared-db

  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: memtrace-ui
    restart: unless-stopped
    ports:
      - "0.0.0.0:5173:8080"
    depends_on:
      api:
        condition: service_healthy
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/cache/nginx:mode=0755,uid=1000,gid=1000
      - /var/run:mode=0755,uid=1000,gid=1000

networks:
  shared-db:
    external: true
    name: shared-db
